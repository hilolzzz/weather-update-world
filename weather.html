<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Precision Weather</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 300px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #38bdf8; }
        .temp { font-size: 4rem; font-weight: bold; margin: 10px 0; }
        button { background: #38bdf8; border: none; padding: 10px 20px; border-radius: 10px; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="card">
    <h1 id="city">Detecting...</h1>
    <div id="status" style="font-size: 0.8rem; color: #94a3b8;">Real-Time Apparent Temp</div>
    <div class="temp" id="temp">--°C</div>
    <button onclick="getLocation()">Update Location</button>
</div>

<script>
    // 1. Initial Load using IP
    async function initWeather() {
        try {
            const geoRes = await fetch('https://ipapi.co/json/');
            const geoData = await geoRes.json();
            fetchWeather(geoData.latitude, geoData.longitude, `${geoData.city}`);
        } catch (e) {
            fetchWeather(17.385, 78.486, "Hyderabad"); 
        }
    }

    // 2. The Pipedream Fetch (Using Apparent Temp)
    async function fetchWeather(lat, lon, locationName) {
        // PASTE YOUR PIPEDREAM URL HERE
        const pipedreamURL = "https://eotwt8cj1vr426p.m.pipedream.net";

        try {
            // Sending the coordinates to your Pipedream "Brain"
            const res = await fetch(`${pipedreamURL}?lat=${lat}&lon=${lon}`);
            const data = await res.json();
            
            // This pulls the 38°C logic from your Pipedream export
            document.getElementById('city').innerText = locationName;
            document.getElementById('temp').innerText = Math.round(data.exactTemp) + "°C";
        } catch (e) {
            // BACKUP: Direct Open-Meteo call using APPARENT TEMPERATURE
            const backup = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=apparent_temperature&timezone=auto`);
            const bData = await backup.json();
            document.getElementById('temp').innerText = Math.round(bData.current.apparent_temperature) + "°C";
            document.getElementById('city').innerText = locationName;
        }
    }

    // 3. Precise GPS Update
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const revGeo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await revGeo.json();
                const neighborhood = data.address.suburb || data.address.neighbourhood || data.address.city || "Nearby";
                fetchWeather(lat, lon, neighborhood);
            }, () => {
                alert("GPS blocked. Showing IP location instead.");
            }, { enableHighAccuracy: true });
        }
    }

    window.onload = initWeather;
</script>

</body>
</html>
